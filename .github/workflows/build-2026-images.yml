name: Build 2026 image assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-2026-images.yml"
      - "scripts/build_2026_images.py"
      - "paper-images-2026.js"
      - "app.js"
      - "inline-writing.js"
      - "index.html"
      - "styles.css"
      - "inline-writing.css"

permissions:
  contents: write

jobs:
  build-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pdfplumber Pillow

      - name: Build images from official PDFs
        run: python scripts/build_2026_images.py

      - name: Commit generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js inline-writing.js styles.css inline-writing.css paper-images-2026.js assets/exams/2026-05-a assets/exams/2026-05-b assets/exams/2026-05-c
          if git diff --cached --quiet; then
            echo "No generated image changes"
          else
            git commit -m "Generate 2026 exam images"
            git push
          fi

